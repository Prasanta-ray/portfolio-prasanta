  <rect x="152" y="420" width="82" height="32" rx="8" fill="#1a1a26" stroke="#2a2a3a"/>
  <text x="193" y="441" fill="#00d4ff" font-family="monospace" font-size="14" text-anchor="middle">Node.js</text>
  <rect x="246" y="420" width="100" height="32" rx="8" fill="#1a1a26" stroke="#2a2a3a"/>
  <text x="296" y="441" fill="#8b5cf6" font-family="monospace" font-size="14" text-anchor="middle">TypeScript</text>
  <rect x="358" y="420" width="72" height="32" rx="8" fill="#1a1a26" stroke="#2a2a3a"/>
  <text x="394" y="441" fill="#f59e0b" font-family="monospace" font-size="14" text-anchor="middle">React</text>
  <rect x="442" y="420" width="80" height="32" rx="8" fill="#1a1a26" stroke="#2a2a3a"/>
  <text x="482" y="441" fill="#00ff88" font-family="monospace" font-size="14" text-anchor="middle">Next.js</text>
