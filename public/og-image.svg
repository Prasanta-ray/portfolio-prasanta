  <text x="80" y="250" fill="#ffffff" font-family="system-ui, sans-serif" font-size="64" font-weight="700">Prasanta Ray</text>
  <text x="80" y="330" fill="#00ff88" font-family="system-ui, sans-serif" font-size="28" font-weight="600">Founder &amp; CEO — Code Lith Labs</text>
  <text x="80" y="380" fill="#9CA3AF" font-family="system-ui, sans-serif" font-size="22">Backend Researcher · Co-Founder @ Stackveil · CSE @ CIT Kokrajhar</text>
